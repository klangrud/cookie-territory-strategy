apiVersion: batch/v1
kind: Job
metadata:
  name: cookie-territory-db-migrate
  namespace: cookie-territory
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: migrate
          image: us-central1-docker.pkg.dev/YOUR_PROJECT_ID/cookie-territory/app:latest
          command: ["node", "node_modules/prisma/build/index.js", "db", "push"]
          envFrom:
            - secretRef:
                name: cookie-territory-secret
      restartPolicy: Never
