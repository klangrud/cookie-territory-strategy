apiVersion: v1
kind: Secret
metadata:
  name: cookie-territory-secret
  namespace: cookie-territory
type: Opaque
stringData:
  # PostgreSQL connection string
  # If using the in-cluster postgres (postgres.yaml), use:
  #   postgresql://cookie:cookie@cookie-territory-db:5432/cookie_territory?schema=public
  DATABASE_URL: "postgresql://cookie:cookie@cookie-territory-db:5432/cookie_territory?schema=public"

  # Generate with: openssl rand -base64 32
  NEXTAUTH_SECRET: "CHANGE-ME-generate-a-random-secret"

  # The public URL where the app is reachable
  NEXTAUTH_URL: "https://cookie-territory.example.com"

  # Google Maps API keys (from Google Cloud Console)
  GOOGLE_MAPS_API_KEY: "your-google-maps-api-key"
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "your-google-maps-api-key"
  NEXT_PUBLIC_GOOGLE_MAP_ID: "your-google-map-id"
